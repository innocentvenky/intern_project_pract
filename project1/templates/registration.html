
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Registration</title>
 
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
 
<style>
 
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}
 
body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#0f172a,#1e3a8a,#2563eb);
    padding:20px;
}
 
.container{
    width:100%;
    max-width:900px;
    background:rgba(255,255,255,0.95);
    backdrop-filter:blur(20px);
    border-radius:25px;
    padding:45px;
    box-shadow:0 25px 50px rgba(0,0,0,0.25);
}
 
.header{
    text-align:center;
    margin-bottom:35px;
}
 
.header h2{
    font-size:2.2rem;
    color:#111827;
    margin-bottom:8px;
}
 
.header p{
    color:#6b7280;
    font-size:15px;
}
 
form{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:22px;
}
 
.input-group{
    display:flex;
    flex-direction:column;
}
 
.input-group label{
    font-size:14px;
    font-weight:600;
    color:#374151;
    margin-bottom:8px;
}
 
.input-group input,
.input-group select{
    height:55px;
    padding:0 18px;
    border:1px solid #d1d5db;
    border-radius:12px;
    font-size:15px;
    background:#fff;
    transition:0.3s;
}
 
.input-group input:focus,
.input-group select:focus{
    border-color:#2563eb;
    box-shadow:0 0 0 4px rgba(37,99,235,0.15);
    outline:none;
}
 
.full-width{
    grid-column:1/-1;
}
 
.btn{
    grid-column:1/-1;
    height:58px;
    border:none;
    border-radius:14px;
    background:linear-gradient(135deg,#2563eb,#1d4ed8);
    color:white;
    font-size:16px;
    font-weight:600;
    cursor:pointer;
    transition:0.3s;
}
 
.btn:hover{
    transform:translateY(-3px);
    box-shadow:0 15px 25px rgba(37,99,235,0.35);
}
 
.form-section{
    margin-bottom:10px;
}
 
.section-title{
    grid-column:1/-1;
    font-size:18px;
    font-weight:600;
    color:#1e3a8a;
    border-bottom:2px solid #e5e7eb;
    padding-bottom:10px;
    margin-bottom:5px;
}
 
@media(max-width:768px){
 
    .container{
        padding:25px;
    }
 
    form{
        grid-template-columns:1fr;
    }
 
    .header h2{
        font-size:1.8rem;
    }
}
 
</style>
</head>
<body>
  <form method="POST">
        {% csrf_token %}
<div class="container">
 
    <div class="header">
        <h2>Registration Form</h2>
        <p>Create your account by filling the details below</p>
    </div>
 
    <form method="POST">
 
        <div class="section-title">Personal Information</div>
 
        <div class="input-group">
            <label>First Name</label>
            <input type="text" name="first_name"
            placeholder="Enter first name" required>
        </div>
 
         <div class="input-group">
            <label>Last Name</label>
            <input type="text" name="last_name"
            placeholder="Enter Last name" required>
        </div>
 
        <div class="input-group">
            <label>Email Address</label>
            <input type="email" name="email" placeholder="example@gmail.com" required>
        </div>
 
        <div class="input-group">
    <label>Password</label>
    <input type="password" name="password" placeholder="Enter Password" required>
</div>
 
       
        <div class="input-group">
            <label>Date of Birth</label>
            <input type="date" required name="date_of_birth">
        </div>
 
          <div class="input-group">
            <label>Phone Number</label>
            <input type="tel" placeholder="9876543210" name="phone_number" required >
        </div>
        <div class="input-group">
    <label>State</label>
    <input type="text" name="state" placeholder="Enter your State" required>
</div>
 
        <div class="input-group">
    <label>City</label>
    <input type="text" name="city" placeholder="Enter City" required>
</div>
 
 
        <div class="input-group">
            <label>Gender</label>
            <select name="gender">
                <option>Select Gender</option>
                <option>male</option>
                <option>female</option>
                <option>other</option>
            </select>
        </div>
 
        <div class="input-group">
    <label>Pincode</label>
    <input type="text"
           name="pincode"
           placeholder="Enter Pincode"
           pattern="[0-9]{6}"
           maxlength="6"
           required>
</div>
        <button type="submit" class="btn">
            Register Now
        </button>
 
    </form>
 
</div>
</form>
 
</body>
</html>
